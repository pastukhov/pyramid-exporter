---
- name: Install jq
  ansible.builtin.apt:
    name: jq
    state: present
  when: pyramid_exporter_install_jq

- name: Check ec_cli is available
  ansible.builtin.command: which ec_cli
  changed_when: false
  check_mode: false

- name: Create textfile collector directory
  ansible.builtin.file:
    path: "{{ pyramid_exporter_textfile_dir }}"
    state: directory
    mode: "0755"

- name: Install pyramid_exporter.sh
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../pyramid_exporter.sh"
    dest: /usr/local/bin/pyramid_exporter.sh
    mode: "0755"
  notify: Restart pyramid-exporter timer

- name: Install systemd service
  ansible.builtin.template:
    src: pyramid-exporter.service.j2
    dest: /etc/systemd/system/pyramid-exporter.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart pyramid-exporter timer

- name: Install systemd timer
  ansible.builtin.template:
    src: pyramid-exporter.timer.j2
    dest: /etc/systemd/system/pyramid-exporter.timer
    mode: "0644"
  notify:
    - Reload systemd
    - Restart pyramid-exporter timer

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start timer
  ansible.builtin.systemd:
    name: pyramid-exporter.timer
    state: started
    enabled: true
